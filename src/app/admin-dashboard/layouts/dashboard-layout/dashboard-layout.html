<div class="drawer lg:drawer-open h-full min-h-0 overflow-hidden">
  <input #drawerToggle id="my-drawer-4" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content grid grid-rows-[auto_1fr] min-w-0 min-h-0 h-full overflow-hidden">
    <!-- Navbar -->
    <nav class="navbar w-full bg-base-100 border-b border-slate-200 justify-between px-4 sticky top-0 z-10 h-16">
      <div class="flex items-center gap-2 min-w-0">
        <label for="my-drawer-4" aria-label="open sidebar"
          class="btn btn-square btn-ghost hover:bg-secondary/10 border-none">
          <!-- Sidebar toggle icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round"
            stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4">
            <path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z"></path>
            <path d="M9 4v16"></path>
            <path d="M14 10l2 2l-2 2"></path>
          </svg>
        </label>
  
        <!-- Título de la página -->
        <div class="divider divider-horizontal mx-0"></div>
        <h1 class="text-lg font-semibold truncate">
          {{ currentRouteTitle() }}
        </h1>
      </div>

      <div class="flex items-center gap-3">
        @if (headerPrimaryAction(); as action) {
          <a
            [routerLink]="action.link"
            (click)="closeDrawerIfMobile()"
            class="btn btn-primary btn-sm shrink-0"
          >
            {{ action.label }}
          </a>
        }
        <div class="hidden sm:flex items-center gap-2 text-sm text-slate-600">
          <div class="avatar placeholder">
            <div class="bg-primary/10 text-primary w-8 rounded-full">
              <span class="text-xs font-semibold"></span>
            </div>
          </div>
          <span class="font-medium">Hostal Admin</span>
        </div>
      </div>
    </nav>
    <!-- Page content here -->
    <div class="p-4 bg-base-200 w-full min-w-0 min-h-0 overflow-auto">
      <router-outlet />
    </div>
  </div>

  <div class="drawer-side is-drawer-close:overflow-visible border-r border-slate-300 h-full">
    <label for="my-drawer-4" aria-label="close sidebar" class="drawer-overlay"></label>
    <div class="flex min-h-full flex-col items-start bg-base-100 is-drawer-close:w-14 is-drawer-open:w-64 overflow-hidden">
      <!-- Sidebar content here -->

      <div class="w-full px-3 py-3 border-b border-slate-200 flex items-center gap-3">
        <div class="size-9 rounded-xl bg-primary text-primary-content grid place-content-center font-bold">
          H
        </div>
        <div class="min-w-0 is-drawer-close:hidden">
          <div class="font-semibold leading-tight truncate">Hostal</div>
          <div class="text-xs text-slate-500 leading-tight truncate">Panel de administración</div>
        </div>
      </div>

      <ul class="menu w-full grow gap-1">
        <li class="menu-title is-drawer-close:hidden text-xs font-semibold text-slate-400 mt-2">Principal</li>
        <!-- List item -->
        <li>
          <a
            [routerLink]="'/reports'"
            (click)="closeDrawerIfMobile()"
            class="is-drawer-close:tooltip is-drawer-close:tooltip-right hover:bg-primary/90 hover:text-primary-content"
            [attr.data-tip]="'Reportes'"
            routerLinkActive="bg-primary text-primary-content"
            [routerLinkActiveOptions]="{ paths: 'exact', queryParams: 'ignored', fragment: 'ignored', matrixParams: 'ignored' }"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round"
              stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4">
              <path d="M3 3v18h18"></path>
              <path d="M7 12v4m4-6v6m4-8v8"></path>
            </svg>
            <span class="is-drawer-close:hidden">Reportes</span>
          </a>
        </li>
        
        <li class="menu-title is-drawer-close:hidden text-xs font-semibold text-slate-400 mt-2">Inventario</li>
        <li>
          <a 
            [routerLink]="'/products'"
            (click)="closeDrawerIfMobile()"
            class="is-drawer-close:tooltip is-drawer-close:tooltip-right hover:bg-primary/90 hover:text-primary-content"
            data-tip="Productos"
            routerLinkActive="bg-primary text-primary-content"
            [routerLinkActiveOptions]="{ paths: 'exact', queryParams: 'ignored', fragment: 'ignored', matrixParams: 'ignored' }"
          >
            <!-- Productos icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round"
              stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4">
              <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"></path>
              <path d="M12 12l8-4.5"></path>
              <path d="M12 12v9"></path>
              <path d="M12 12L4 7.5"></path>
            </svg>
            <span class="is-drawer-close:hidden">Productos</span>
          </a>
        </li>
        <li>
          <a 
            [routerLink]="'/categories'"
            (click)="closeDrawerIfMobile()"
            class="is-drawer-close:tooltip is-drawer-close:tooltip-right hover:bg-primary/90 hover:text-primary-content"
            data-tip="Categorías"
            routerLinkActive="bg-primary text-primary-content"
            [routerLinkActiveOptions]="{ paths: 'exact', queryParams: 'ignored', fragment: 'ignored', matrixParams: 'ignored' }"
          >
            <!-- Categorías icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round"
              stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4">
              <path d="M7 7h.01"></path>
              <path d="M3 7a4 4 0 0 1 4 -4h10a4 4 0 0 1 4 4v10a4 4 0 0 1 -4 4h-10a4 4 0 0 1 -4 -4z"></path>
              <path d="M8 7h13"></path>
              <path d="M8 12h13"></path>
              <path d="M8 17h13"></path>
            </svg>
            <span class="is-drawer-close:hidden">Categorías</span>
          </a>
        </li>

        <li class="menu-title is-drawer-close:hidden text-xs font-semibold text-slate-400 mt-2">Movimientos</li>
        <li>
          <a 
            [routerLink]="'/purchases'"
            (click)="closeDrawerIfMobile()"
            class="is-drawer-close:tooltip is-drawer-close:tooltip-right hover:bg-primary/90 hover:text-primary-content"
            data-tip="Compras" 
            routerLinkActive="bg-primary text-primary-content"
            [routerLinkActiveOptions]="{ paths: 'exact', queryParams: 'ignored', fragment: 'ignored', matrixParams: 'ignored' }"
          >
            <!-- Compras icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round"
              stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
              <path d="M3 6h18"></path>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span class="is-drawer-close:hidden">Compras</span>
          </a>
        </li>
        <li>
          <a 
            [routerLink]="'/sales'"
            (click)="closeDrawerIfMobile()"
            class="is-drawer-close:tooltip is-drawer-close:tooltip-right hover:bg-primary/90 hover:text-primary-content"
            [attr.data-tip]="'Ventas'" 
            routerLinkActive="bg-primary text-primary-content"
            [routerLinkActiveOptions]="{ paths: 'exact', queryParams: 'ignored', fragment: 'ignored', matrixParams: 'ignored' }"
          >
            <!-- Ventas icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round"
              stroke-width="2" fill="none" stroke="currentColor" class="my-1.5 inline-block size-4">
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
              <polyline points="16 7 22 7 22 13"></polyline>
            </svg>
            <span class="is-drawer-close:hidden">Ventas</span>
          </a>
        </li>
      </ul>

      <div class="w-full border-t border-slate-200 pt-2 pb-3">
        <ul class="menu w-full gap-1">
          <li>
            <button
              type="button"
              (click)="logout(); closeDrawerIfMobile()"
              class="is-drawer-close:tooltip is-drawer-close:tooltip-right hover:bg-error/10 hover:text-error"
              data-tip="Cerrar sesión"
            >
              <!-- Logout icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round"
                stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor"
                class="my-1.5 inline-block size-4">
                <path d="M10 8V7a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-7a2 2 0 0 1-2-2v-1"></path>
                <path d="M15 12H3"></path>
                <path d="M6 9l-3 3l3 3"></path>
              </svg>
              <span class="is-drawer-close:hidden text-nowrap">Cerrar sesión</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
