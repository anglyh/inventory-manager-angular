<div class="h-full w-full">
  <div class="mx-auto flex h-full max-w-4xl flex-col">
    <!-- Header -->
    <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center gap-3">
        <app-button
          (click)="goBackToSales()"
          variant="ghost"
          size="sm"
          customClass="btn-circle"
          aria-label="Volver"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
            class="h-5 w-5"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
          </svg>
        </app-button>
        <div>
          <h1 class="text-2xl font-bold tracking-tight">Nueva Venta</h1>
          <p class="text-sm text-base-content/70">Registra una salida de inventario</p>
        </div>
      </div>
    </div>

    <!-- Contenido Principal: Formulario -->
    <div class="card bg-base-100 shadow-xl flex-1">
      <div class="card-body p-4 sm:p-6 md:p-8">
        <movement-form type="exit" />
      </div>
    </div>
  </div>
</div>
