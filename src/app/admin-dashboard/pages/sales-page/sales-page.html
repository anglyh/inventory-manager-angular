<div class="flex flex-col h-full w-full overflow-x-auto">
  <div class="flex w-full mb-4 gap-4">
    <button class="btn btn-primary" routerLink="/sales/new">
      Nueva venta
    </button>
  </div>

  <inventory-movement-list [movements]="movements()" />

  @if (hasNextPage()) {
    <div appInfiniteScroll (scrolled)="loadMore()" class="loading-trigger">
      @if (isLoading()) {
      <p>Cargando...</p>
      }
    </div>
  }
</div>
