<div class="flex flex-col h-full w-full overflow-x-auto">
  <div class="flex w-full mb-4 gap-4">
    <app-button routerLink="/purchases/new">
      Nueva Compra
    </app-button>
  </div>

  <inventory-movement-list 
    [movements]="movements()"
  />

  @if (hasNextPage()) {
    <div appInfiniteScroll (scrolled)="loadMore()" class="loading-trigger">
      @if (isLoading()) {
        <div class="flex flex-col gap-4">
          <div class="skeleton h-5 w-40 rounded-md"></div>

          <div class="flex flex-col gap-3">
            <div class="skeleton h-24 w-full rounded-2xl"></div>
            <div class="skeleton h-24 w-full rounded-2xl"></div>
            <div class="skeleton h-24 w-full rounded-2xl"></div>
          </div>

          <div class="flex justify-end">
            <div class="skeleton h-10 w-24 rounded-xl"></div>
          </div>
        </div>
      }
    </div>
  }
</div>
