<div class="flex justify-between w-full mb-4 gap-4">
  <search-product-form class="w-90"/>
  <button 
    type="button"
    class="btn btn-primary text-base hidden md:flex md:justify-between md:items-center gap-3" 
    (click)="openModal()"
  >
    Nuevo Producto
    <ng-icon name="tablerPlus" />
  </button>
  <button type="button" class="btn btn-primary md:hidden" (click)="openModal()">
    <ng-icon name="tablerPlus" />
  </button>
</div>

<product-table
  [products]="productResource.value()?.data ?? []"
  (edit)="openModal($event)"
/>

<div class="mb-4"></div>

<app-pagination
  [pages]="productResource.value()?.totalPages ?? 0"
  [currentPage]="paginationService.currentPage()"
/>

<!-- product-form-modal -->
<app-modal (closed)="closeModal()" [isOpen]="isModalOpen()">
  <product-form
    [productInitialData]="selectedProduct()"
    (onSuccess)="closeModal();"
    (onCancel)="closeModal()"
  />
</app-modal>
