<div class="flex justify-between w-full mb-4 gap-4">
  <search-product-form class="w-90"/>
  <app-button 
    type="button"
    customClass="text-base hidden md:flex md:justify-between md:items-center gap-3" 
    (click)="openNewProduct()"
  >
    Nuevo Producto
    <ng-icon name="tablerPlus" />
  </app-button>
  <app-button type="button" customClass="md:hidden" (click)="openNewProduct()">
    <ng-icon name="tablerPlus" />
  </app-button>
</div>

<product-table
  [products]="productResource.value()?.data ?? []"
  (edit)="openModal($event)"
/>

<div class="mb-4"></div>

<app-pagination
  [pages]="productResource.value()?.totalPages ?? 0"
  [currentPage]="paginationService.currentPage()"
/>

<!-- product-form-modal -->
<app-modal (closed)="closeModal()" [isOpen]="isModalOpen()">
  <product-form
    [productInitialData]="selectedProduct()"
    (onSuccess)="closeModal(); productResource.reload()"
    (onCancel)="closeModal()"
  />
</app-modal>
