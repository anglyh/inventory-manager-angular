<div class="flex flex-col md:flex-row md:items-center md:justify-between w-full mb-4 gap-3">
  <search-product-form class="w-full md:max-w-96" />
  
  <div class="w-full md:w-auto flex flex-col md:flex-row md:items-center gap-3">
    <app-category-multiselect-filter
      [categories]="categories()"
      [value]="categoryFilter()"
      (valueChange)="onCategoryChange($event)"
      class="w-full md:w-auto"
    ></app-category-multiselect-filter>

    <app-button 
      type="button"
      customClass="text-[15px] h-10 min-h-10 px-4 flex justify-center items-center gap-2 whitespace-nowrap w-full md:w-auto rounded-2xl" 
      (click)="openNewProduct()"
    >
      Nuevo Producto
      <ng-icon name="tablerPlus" class="text-xl" />
    </app-button>
  </div>
</div>

<product-table
  [products]="productResource.value()?.data ?? []"
  [loading]="productResource.isLoading()"
  (edit)="openModal($event)"
/>

<div class="mb-4"></div>

<app-pagination
  [pages]="productResource.value()?.totalPages ?? 0"
  [currentPage]="paginationService.currentPage()"
/>

<!-- product-form-modal -->
<app-modal (closed)="closeModal()" [isOpen]="isModalOpen()">
  <product-form
    [productInitialData]="selectedProduct()"
    (onSuccess)="closeModal(); productResource.reload()"
    (onCancel)="closeModal()"
  />
</app-modal>
