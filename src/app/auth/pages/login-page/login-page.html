<div class="min-h-screen flex bg-gray-50">
  <!-- Left Column - Login Form -->
  <div class="w-full lg:w-1/2 flex flex-col justify-center px-6 sm:px-8 lg:px-12">
    <form 
      class="max-w-md mx-auto w-full"
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
    >
      <!-- Logo/Header -->
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Bienvenido</h1>
        <p class="text-gray-600 mt-2">Inicia sesión en tu cuenta</p>
      </div>

      <!-- Email Input -->
      <div class="mb-6">
        <div class="flex items-center border border-gray-300 rounded-full px-4 py-3 bg-white">
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
          <input 
            class="flex-1 ml-3 outline-none text-gray-700 placeholder-gray-500" 
            placeholder="Correo electrónico"
            type="email"
            formControlName="email"
          >
        </div>
        @if (formUtils.isInvalidField(loginForm, 'email')) {
          <app-form-error-label [control]="loginForm.get('email')!" />
        }
      </div>

      <!-- Password Input -->
      <div class="mb-8">
        <div class="flex items-center border border-gray-300 rounded-full px-4 py-3 bg-white overflow-hidden">
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
          </svg>
          <input 
            [type]="showPassword() ? 'text' : 'password'" 
            placeholder="Contraseña" 
            class="flex-1 min-w-0 ml-3 outline-none text-gray-700 placeholder-gray-500" 
            formControlName="password" 
          >
          <button
            type="button"
            class="ml-2 shrink-0 flex cursor-pointer text-gray-400 hover:text-gray-600 active:text-gray-700 select-none p-1"
            (click)="showPassword.set(!showPassword())"
            aria-label="Mostrar u ocultar contraseña"
          >
            <ng-icon
              class="block"
              [name]="showPassword() ? 'tablerEyeOff' : 'tablerEye'"
              size="20"
            ></ng-icon>
          </button>
        </div>
        @if (formUtils.isInvalidField(loginForm, 'password')) {
          <app-form-error-label [control]="loginForm.get('password')!" />
        }
      </div>

      @if (hasError()) {
        <div class="mb-4 bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl text-sm font-medium">
          {{ errorMessage() }}
        </div>
      }

      <!-- Sign Up Button -->
      <app-button 
        type="submit"
        customClass="w-full font-semibold rounded-full transition 
                    disabled:cursor-not-allowed 
                    disabled:opacity-100 
                    disabled:brightness-90"
        [disabled]="isLoading()"
      > 
        Iniciar sesión
        @if (isLoading()) {
          <span class="loading loading-spinner loading-xs"></span>
        }
      </app-button>

      <!-- Login Link -->
      <p class="text-center mt-6 text-gray-600 text-sm">
        ¿No tienes una cuenta? <a routerLink="/auth/register" class="text-primary hover:text-sky-800 font-semibold">Regístrate</a>
      </p>
    </form>
  </div>

  <!-- Right Column - Image/Content (Hidden on mobile) -->
  <div class="hidden lg:flex w-1/2 bg-primary items-center justify-center">
    <div class="text-center text-white px-8">
      <!-- <h2 class="text-4xl font-bold mb-4">IA revolucionando la forma en que creamos, renderizamos y experimentamos contenido.</h2>
      <p class="text-lg opacity-90">Crea briefs de diseño con comandos de voz de la IA para generar experiencias increíbles que se ajusten a tus necesidades.</p> -->
    </div>
  </div>
</div>
