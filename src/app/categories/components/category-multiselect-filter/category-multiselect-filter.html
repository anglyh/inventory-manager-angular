<div class="relative inline-block w-full md:w-auto">
  <button
    type="button"
    class="btn btn-outline border-base-300 hover:bg-base-200 text-base-content font-medium rounded-2xl bg-base-100 h-10 min-h-10 px-4 flex items-center gap-2 w-full md:w-auto justify-center"
    (click)="isOpen.set(!isOpen())"
  >
    <ng-icon name="tablerFilter" class="text-xl"></ng-icon>
    <span class="text-[15px]">Categorias</span>
    @if (selectedCount() > 0) {
      <div class="badge badge-primary badge-sm ml-1">{{ selectedCount() }}</div>
    }
  </button>

  @if (isOpen()) {
    <div class="absolute z-10 mt-2 w-full md:w-64 md:left-0 rounded-box border border-base-300 bg-base-100 shadow-xl p-3">
      <div class="max-h-64 overflow-auto rounded-lg border border-base-200">
        <ul class="menu menu-sm p-1">
          @for (c of categories(); track c.id) {
            <li>
              <label class="flex items-center gap-2 px-2 py-2 cursor-pointer">
                <input
                  type="checkbox"
                  class="checkbox checkbox-sm"
                  [checked]="isChecked(c.name)"
                  (change)="toggleCategory(c)"
                />
                <span class="truncate">{{ c.name }}</span>
              </label>
            </li>
          }
          @if (categories().length === 0) {
            <li class="px-3 py-2 text-sm text-base-content/60">
              No hay categorías.
            </li>
          }
        </ul>
      </div>

      <div class="mt-3 flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" (click)="clearAll()">
          Todas
        </button>
        <button type="button" class="btn btn-primary btn-sm" (click)="apply()">
          Aplicar
        </button>
      </div>
    </div>
  }
</div>
