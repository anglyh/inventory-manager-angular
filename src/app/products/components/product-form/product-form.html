<h3 class="font-bold text-lg mb-4 text-base-content">
  {{ productInitialData()?.id ? 'Editar producto' : 'Nuevo producto' }}
</h3>

<form
  class="flex flex-col gap-3" 
  (ngSubmit)="onSubmit()"
  [formGroup]="productForm"
>
  <!-- Nombre -->
  <label class="form-control w-full">
    <div class="label">
      <span class="label-text font-medium text-base-content mb-1">Nombre del producto</span>
    </div>
    <input type="text" placeholder="Ej. Agua mineral 500ml" class="input input-bordered w-full" formControlName="name" />
  </label>

  <!-- Precio y Stock Mínimo -->
  <div class="grid grid-cols-2 gap-4">
    <label class="form-control w-full">
      <div class="label">
        <span class="label-text font-medium text-base-content mb-1">Precio de venta</span>
      </div>
      <label class="input input-bordered flex items-center gap-2">
        <span class="text-base-content/60">S/.</span>
        <input type="number" step="0.01" placeholder="2.50" class="grow" formControlName="salePrice" min="0.01"/>
      </label>
    </label>

    <label class="form-control w-full">
      <div class="label">
        <span class="label-text font-medium text-base-content mb-1">Stock mínimo</span>
      </div>
      <label class="input input-bordered flex items-center gap-2">
        <input type="number" placeholder="Ej. 10" class="grow" formControlName="minStock" min="0" />
      </label>
    </label>
  </div>

  <!-- Código de barras -->
  <label class="form-control w-full">
    <div class="label">
      <span class="label-text font-medium text-base-content mb-1">Código de barras</span>
    </div>
    <input
      type="text"
      placeholder="Ej. 7501030300050"
      class="input input-bordered w-full"
      formControlName="barcode"
      inputmode="numeric"
      autocomplete="off"
    />
  </label>

  <!-- Categoría (pendiente de implementar) -->
  <label class="form-control w-full">
    <div class="label">
      <span class="label-text font-medium text-base-content mb-1">Categoría</span>
    </div>
    <select
      class="select select-bordered w-full bg-base-100 py-2 pr-10 focus:border-primary focus:ring-2 focus:ring-primary/20"
      formControlName="categoryId"
    >
      <option [ngValue]="null">Sin categoría</option>
      @for (c of categories(); track c.id) {
        <option [ngValue]="c.id">{{ c.name }}</option>
      }
    </select>
  </label>

  <!-- Botones de Acción -->
  <div class="flex justify-end gap-3 mt-4">
    <app-button type="button" variant="ghost" [disabled]="isSubmitting()" (click)="onCancel.emit()">
      Cancelar
    </app-button>
    <app-button type="submit" [loading]="isSubmitting()" [disabled]="productForm.invalid || isSubmitting()">
      {{ productInitialData()?.id ? 'Actualizar' : 'Guardar' }}
    </app-button>
  </div>
</form>
