<div class="relative w-full group">
  <input 
    class="input input-bordered w-full pr-10 focus:outline-none focus:border-slate-800 focus:ring-1 focus:ring-slate-800 transition-all duration-200"
    type="text"
    id="productSearchInput"
    placeholder="Busca un producto..."
    [value]="searchTerm()"
    (input)="searchTerm.set(searchInputRef.value)"
    (keydown.enter)="search(searchInputRef.value)"
    #searchInputRef 
  />

  @if (searchTerm()) {
    <app-button 
      type="button"
      variant="ghost"
      customClass="absolute inset-y-0 right-0 flex items-center pr-3 border-none !min-h-0 !h-full p-0 px-3 bg-transparent hover:bg-transparent text-base-400 hover:text-slate-800 transition-colors cursor-pointer"
      (click)="searchTerm.set(''); searchInputRef.value = ''; searchInputRef.focus(); search('')"
      aria-label="Limpiar búsqueda"
    >
      <ng-icon name="tablerX" class="text-xl" />
    </app-button>
  }
</div>
