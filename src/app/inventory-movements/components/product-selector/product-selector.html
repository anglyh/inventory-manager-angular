<div class="relative flex w-full flex-col gap-1">
  <div class="relative">

    <input
      #searchInput
      [id]="controlId()"
      type="text"
      class="input input-bordered w-full bg-base-100 py-2 pr-10 focus:border-primary focus:ring-2 focus:ring-primary/20"
      placeholder="Busca un producto..."
      [value]="inputValue()"
      (input)="onInput(searchInput.value)"
      (focus)="isDropdownOpen.set(true)"
      autocomplete="off"
    />
    
    @if (inputValue()) {
      <button 
        type="button" 
        class="absolute right-3 top-1/2 -translate-y-1/2 text-base-content/50 hover:text-base-content/80 transition-colors cursor-pointer"
        (click)="onInput(''); searchInput.focus()"
        title="Limpiar"
        aria-label="Limpiar búsqueda"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
        </svg>
      </button>
    }
  </div>

  <div class="dropdown-grid-wrapper" [class.active]="isDropdownOpen()">
    <ul class="inner-list rounded-box border border-base-300 bg-base-100 shadow-xl">
      @if (filteredProducts().length > 0) {
        @for (product of filteredProducts(); track product.id) {
          <li
            class="product-item rounded-md p-2 hover:bg-base-200 focus:bg-base-300 focus:outline-none"
            tabindex="0"
            (mousedown)="onSelectProduct(product)"
            (keydown.enter)="onSelectProduct(product)"
          >
            {{ product.name }}
          </li>
        }
      } @else {
        <li class="p-2 text-sm opacity-70">No existe ningún producto con ese nombre</li>
      }
    </ul>
  </div>
</div>

<style>
  label {
    position: relative;
  }

  .dropdown-grid-wrapper {
    display: grid;
    grid-template-rows: 0fr;
    position: absolute;
    top: calc(100% + 4px);
    width: 100%;
    z-index: 50;

    opacity: 0;
    visibility: hidden;
    transition:
      grid-template-rows 200ms ease-in-out,
      opacity 200ms ease-in-out,
      visibility 200ms ease-in-out;
  }

  .dropdown-grid-wrapper.active {
    grid-template-rows: 1fr;
    opacity: 1;
    visibility: visible;
  }

  .inner-list {
    min-height: 0;
    overflow-y: auto;
    max-height: 18rem;
    margin: 0;
    padding: 0;
    transition: padding 200ms ease-in-out;
  }

  .dropdown-grid-wrapper.active .inner-list {
    padding: 0.5rem;
  }

  .product-item {
    cursor: pointer;
    user-select: none;
  }
</style>
